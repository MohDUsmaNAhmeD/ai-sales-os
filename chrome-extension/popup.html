<!DOCTYPE html>
<html>
<head>
  <style>
    body {
      width: 360px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      margin: 0;
    }
    h3 { margin: 0 0 4px; font-size: 14px; color: #1a1a1a; }
    .subtitle { font-size: 11px; color: #999; margin: 0 0 12px; }
    .platform-btn {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      background: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
      transition: all 0.15s;
    }
    .platform-btn:hover { border-color: #3b82f6; background: #eff6ff; }
    .platform-btn:active { transform: scale(0.98); }
    .platform-btn .icon {
      width: 28px; height: 28px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: bold; font-size: 14px; flex-shrink: 0;
    }
    .platform-btn .text { text-align: left; }
    .platform-btn .name { font-size: 13px; font-weight: 500; color: #1a1a1a; }
    .platform-btn .desc { font-size: 11px; color: #999; }
    .result {
      border-radius: 8px; padding: 12px; font-size: 12px;
      display: none; margin-top: 8px; word-break: break-word;
    }
    .result.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .result.error { background: #fef2f2; border: 1px solid #fecaca; color: #991b1b; }
    .result strong { display: block; margin-bottom: 4px; }
    .result .cookies { font-size: 10px; color: #666; margin-top: 4px; }
    .spinner {
      display: inline-block; width: 14px; height: 14px;
      border: 2px solid #ccc; border-top-color: #3b82f6;
      border-radius: 50%; animation: spin 0.6s linear infinite;
      vertical-align: middle; margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <h3>AI Sales OS</h3>
  <p class="subtitle">Export cookies from the current tab</p>

  <button class="platform-btn" id="btn-linkedin" data-platform="LINKEDIN">
    <div class="icon" style="background: #0a66c2">in</div>
    <div class="text"><div class="name">LinkedIn</div><div class="desc">Click to export LinkedIn cookies</div></div>
  </button>

  <button class="platform-btn" id="btn-facebook" data-platform="FACEBOOK">
    <div class="icon" style="background: #1877f2">f</div>
    <div class="text"><div class="name">Facebook</div><div class="desc">Click to export Facebook cookies</div></div>
  </button>

  <button class="platform-btn" id="btn-twitter" data-platform="TWITTER">
    <div class="icon" style="background: #000">X</div>
    <div class="text"><div class="name">Twitter / X</div><div class="desc">Click to export Twitter cookies</div></div>
  </button>

  <div class="result" id="result"></div>

  <script src="popup.js"></script>
</body>
</html>
